openapi: 3.1.0
info:
  title: Paper Engineering Assistant API
  version: 0.1.0
  description: |
    Canonical REST contract for backend routes used by desktop literature and governance workflows.
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: health
    description: Service health endpoint.
  - name: research-lifecycle
    description: Paper project lifecycle and governance endpoints.
  - name: literature
    description: Literature import, scope, overview, and metadata endpoints.
  - name: topic-settings
    description: Topic profile settings for auto-pull.
  - name: auto-pull
    description: Rule-driven automatic pull, runs, and alerts.

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service liveness.
      tags: [health]
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /paper-projects:
    post:
      operationId: createPaperProject
      summary: Create a paper project.
      tags: [research-lifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaperProjectRequest'
            example:
              topic_id: TOPIC-001
              title: Retrieval-Augmented Generation Evaluation
              research_direction: LLM
              created_by: human
              initial_context:
                literature_evidence_ids:
                  - LIT-0001
                  - LIT-0002
      responses:
        '201':
          description: Paper project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaperProjectResponse'
              example:
                paper_id: P001
                status: active
                paper_active_sp_full: null
                paper_active_sp_partial: null
                created_at: '2026-02-27T08:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/version-spine/commit:
    post:
      operationId: commitVersionSpine
      summary: Commit a version spine node for a paper.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionSpineCommitRequest'
      responses:
        '200':
          description: Version spine node committed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionSpineCommitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/stage-gates/{gate}/verify:
    post:
      operationId: verifyStageGate
      summary: Verify stage gate candidates for a paper.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: gate
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StageGateVerifyRequest'
      responses:
        '200':
          description: Stage gate verification completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StageGateVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/writing-packages/build:
    post:
      operationId: buildWritingPackage
      summary: Build a writing package from a snapshot.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WritingPackageBuildRequest'
      responses:
        '200':
          description: Writing package built.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritingPackageBuildResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/timeline:
    get:
      operationId: getPaperTimeline
      summary: Get timeline events for a paper.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Paper timeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaperTimelineResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/resource-metrics:
    get:
      operationId: getPaperResourceMetrics
      summary: Get runtime resource metrics for a paper.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Paper runtime metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaperResourceMetricsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/artifact-bundle:
    get:
      operationId: getPaperArtifactBundle
      summary: Get artifact bundle URLs for a paper.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Paper artifact bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaperArtifactBundleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/release-gate/review:
    post:
      operationId: reviewReleaseGate
      summary: Submit release gate review decision.
      tags: [research-lifecycle]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseReviewRequest'
      responses:
        '200':
          description: Release gate review recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseGateReviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /literature/import:
    post:
      operationId: importLiterature
      summary: Import literature items into repository.
      tags: [literature]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiteratureImportRequest'
            example:
              items:
                - provider: manual
                  external_id: manual-1
                  title: Calibrating LLM Evaluators for Citation Grounding
                  authors: [Alice Chen, Bob Li]
                  year: 2025
                  doi: 10.1145/1234567.8901234
                  source_url: https://doi.org/10.1145/1234567.8901234
                  rights_class: OA
                  tags: [survey, eval]
      responses:
        '200':
          description: Import finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiteratureImportResponse'
              example:
                results:
                  - literature_id: LIT-0001
                    is_new: true
                    matched_by: none
                    title: Calibrating LLM Evaluators for Citation Grounding
                    source_provider: manual
                    source_url: https://doi.org/10.1145/1234567.8901234
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /literature/zotero-import:
    post:
      operationId: importLiteratureFromZotero
      summary: Import literature from Zotero library.
      tags: [literature]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoteroImportRequest'
            example:
              library_type: users
              library_id: '123456'
              query: retrieval evaluation
              limit: 20
              topic_id: TOPIC-001
              scope_status: in_scope
              scope_reason: initial seeding
              tags: [zotero, seed]
      responses:
        '200':
          description: Zotero import finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoteroImportResponse'
              example:
                topic_id: TOPIC-001
                imported_count: 8
                scope_upserted_count: 8
                results:
                  - literature_id: LIT-1001
                    is_new: true
                    matched_by: none
                    title: Retrieval-Augmented Evaluation Benchmarks
                    source_provider: zotero
                    source_url: https://www.zotero.org/users/123456/items/ABCD1234
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'
        '500':
          $ref: '#/components/responses/InternalError'

  /literature/zotero-preview:
    post:
      operationId: previewLiteratureFromZotero
      summary: Fetch Zotero literature candidates for manual review table.
      tags: [literature]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoteroImportRequest'
            example:
              library_type: users
              library_id: '123456'
              query: retrieval evaluation
              limit: 20
              tags: [zotero, review]
      responses:
        '200':
          description: Zotero preview fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoteroPreviewResponse'
              example:
                fetched_count: 2
                items:
                  - provider: zotero
                    external_id: ABCD1234
                    title: Retrieval-Augmented Evaluation Benchmarks
                    abstract: ...
                    authors: [Alice, Bob]
                    year: 2025
                    doi: 10.1145/1234567.8901234
                    source_url: https://www.zotero.org/users/123456/items/ABCD1234
                    rights_class: USER_AUTH
                    tags: [zotero, review]
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'
        '500':
          $ref: '#/components/responses/InternalError'

  /literature/overview:
    get:
      operationId: getLiteratureOverview
      summary: Get literature overview filtered by topic and/or paper.
      tags: [literature]
      description: At least one of `topic_id` or `paper_id` must be provided.
      parameters:
        - $ref: '#/components/parameters/TopicIdQueryParam'
        - $ref: '#/components/parameters/PaperIdQueryParam'
      responses:
        '200':
          description: Literature overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiteratureOverviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /topics/{topicId}/literature-scope:
    get:
      operationId: getTopicLiteratureScope
      summary: Get literature scope list for a topic.
      tags: [literature]
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Topic literature scope list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicLiteratureScopeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: upsertTopicLiteratureScope
      summary: Upsert literature scope actions for a topic.
      tags: [literature]
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertTopicLiteratureScopeRequest'
      responses:
        '200':
          description: Updated topic scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicLiteratureScopeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/literature-links/from-topic:
    post:
      operationId: syncPaperLiteratureFromTopic
      summary: Sync in-scope topic literature into paper links.
      tags: [literature]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPaperLiteratureFromTopicRequest'
      responses:
        '200':
          description: Sync summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPaperLiteratureFromTopicResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/literature:
    get:
      operationId: getPaperLiterature
      summary: Get literature links under a paper.
      tags: [literature]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Paper literature links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaperLiteratureResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /paper-projects/{id}/literature-links/{linkId}:
    patch:
      operationId: updatePaperLiteratureLink
      summary: Update citation status or note of a paper literature link.
      tags: [literature]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: linkId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaperLiteratureLinkRequest'
      responses:
        '200':
          description: Updated paper literature link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePaperLiteratureLinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /literature/{literatureId}/metadata:
    patch:
      operationId: updateLiteratureMetadata
      summary: Update literature metadata fields.
      tags: [literature]
      parameters:
        - name: literatureId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLiteratureMetadataRequest'
      responses:
        '200':
          description: Updated literature metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateLiteratureMetadataResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /topics/settings:
    post:
      operationId: createTopicProfile
      summary: Create a topic profile.
      tags: [topic-settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopicProfileRequest'
            example:
              topic_id: TOPIC-LLM-EVAL
              name: LLM Evaluation
              is_active: true
              include_keywords: [llm, evaluation]
              exclude_keywords: [biology]
              venue_filters: [NeurIPS, ICML]
              default_lookback_days: 30
      responses:
        '201':
          description: Topic profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicProfileDTO'
              example:
                topic_id: TOPIC-LLM-EVAL
                name: LLM Evaluation
                is_active: true
                include_keywords: [llm, evaluation]
                exclude_keywords: [biology]
                venue_filters: [NeurIPS, ICML]
                default_lookback_days: 30
                default_min_year: null
                default_max_year: null
                rule_ids: []
                created_at: '2026-02-27T08:10:00.000Z'
                updated_at: '2026-02-27T08:10:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      operationId: listTopicProfiles
      summary: List topic profiles.
      tags: [topic-settings]
      responses:
        '200':
          description: Topic profile list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicProfileListResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /topics/settings/{topicId}:
    patch:
      operationId: updateTopicProfile
      summary: Update a topic profile.
      tags: [topic-settings]
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTopicProfileRequest'
      responses:
        '200':
          description: Topic profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicProfileDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auto-pull/rules:
    post:
      operationId: createAutoPullRule
      summary: Create an auto-pull rule.
      tags: [auto-pull]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutoPullRuleRequest'
            example:
              scope: TOPIC
              topic_ids: [TOPIC-LLM-EVAL]
              name: Weekly LLM Eval Digest
              status: ACTIVE
              query_spec:
                include_keywords: [llm, evaluation]
                exclude_keywords: [biology]
                authors: []
                venues: [NeurIPS, ICML]
                max_results_per_source: 20
              time_spec:
                lookback_days: 30
                min_year: 2020
                max_year: null
              quality_spec:
                min_completeness_score: 0.6
                require_include_match: true
              sources:
                - source: CROSSREF
                  enabled: true
                  priority: 1
                  config: {}
                - source: ARXIV
                  enabled: true
                  priority: 2
                  config: {}
              schedules:
                - frequency: WEEKLY
                  days_of_week: [MON]
                  hour: 9
                  minute: 0
                  timezone: UTC
                  active: true
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoPullRuleDTO'
              example:
                rule_id: 8f6a8a66-bf90-4e69-9315-efa8d2f84f7e
                scope: TOPIC
                topic_id: TOPIC-LLM-EVAL
                topic_ids: [TOPIC-LLM-EVAL]
                name: Weekly LLM Eval Digest
                status: ACTIVE
                query_spec:
                  include_keywords: [llm, evaluation]
                  exclude_keywords: [biology]
                  authors: []
                  venues: [NeurIPS, ICML]
                  max_results_per_source: 20
                time_spec:
                  lookback_days: 30
                  min_year: 2020
                  max_year: null
                quality_spec:
                  min_completeness_score: 0.6
                  require_include_match: true
                sources:
                  - source: CROSSREF
                    enabled: true
                    priority: 1
                    config: {}
                schedules:
                  - frequency: WEEKLY
                    days_of_week: [MON]
                    hour: 9
                    minute: 0
                    timezone: UTC
                    active: true
                created_at: '2026-02-27T08:15:00.000Z'
                updated_at: '2026-02-27T08:15:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      operationId: listAutoPullRules
      summary: List auto-pull rules by filters.
      tags: [auto-pull]
      parameters:
        - $ref: '#/components/parameters/AutoPullScopeQueryParam'
        - $ref: '#/components/parameters/TopicIdQueryParam'
        - $ref: '#/components/parameters/AutoPullRuleStatusQueryParam'
      responses:
        '200':
          description: Rule list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoPullRuleListResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auto-pull/rules/{ruleId}:
    patch:
      operationId: updateAutoPullRule
      summary: Update an auto-pull rule.
      tags: [auto-pull]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAutoPullRuleRequest'
      responses:
        '200':
          description: Rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoPullRuleDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteAutoPullRule
      summary: Delete an auto-pull rule.
      tags: [auto-pull]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Rule deleted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auto-pull/rules/{ruleId}/runs:
    post:
      operationId: triggerAutoPullRuleRun
      summary: Trigger a run for a rule.
      tags: [auto-pull]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutoPullRunRequest'
            example:
              trigger_type: MANUAL
              full_refresh: true
      responses:
        '201':
          description: Run queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoPullRunDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auto-pull/runs/{runId}/retry-failed-sources:
    post:
      operationId: retryFailedAutoPullSources
      summary: Retry failed sources from a previous run.
      tags: [auto-pull]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
