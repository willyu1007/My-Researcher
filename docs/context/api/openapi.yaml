      operationId: getValueAssessment
      summary: Get a value assessment detail.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: valueAssessmentId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Value assessment detail.
    patch:
      operationId: updateValueAssessment
      summary: Patch the current value assessment.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: valueAssessmentId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Value assessment updated.

  /title-cards/{titleCardId}/packages:
    get:
      operationId: listPackages
      summary: List packages for a title card.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Package list.
    post:
      operationId: createPackage
      summary: Create a package for a title card.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '201':
          description: Package created.

  /title-cards/{titleCardId}/packages/{packageId}:
    get:
      operationId: getPackage
      summary: Get a package detail.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: packageId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Package detail.
    patch:
      operationId: updatePackage
      summary: Patch the current package.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: packageId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Package updated.

  /title-cards/{titleCardId}/promotion-decisions:
    get:
      operationId: listPromotionDecisions
      summary: List promotion decisions for a title card.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Promotion decision list.
    post:
      operationId: createPromotionDecision
      summary: Create a promotion decision for a title card.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '201':
          description: Promotion decision created.

  /title-cards/{titleCardId}/promotion-decisions/{decisionId}:
    get:
      operationId: getPromotionDecision
      summary: Get a promotion decision detail.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Promotion decision detail.
    patch:
      operationId: updatePromotionDecision
      summary: Patch the current promotion decision.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '200':
          description: Promotion decision updated.

  /title-cards/{titleCardId}/promote-to-paper-project:
    post:
      operationId: promoteTitleCardToPaperProject
      summary: Promote a title card into a paper project using aligned question, value, and package ids.
      tags: [title-card-management]
      parameters:
        - name: titleCardId
          in: path
          required: true
          schema:
            type: string
            minLength: 4
      responses:
        '201':
          description: Title card promoted and paper project created.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  parameters:
    PaperIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    GateParam:
      name: gate
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TopicIdParam:
      name: topicId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RuleIdParam:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunIdParam:
      name: runId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AlertIdParam:
      name: alertId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LinkIdParam:
      name: linkId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LiteratureIdParam:
      name: literatureId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TopicIdQueryParam:
      name: topic_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    PaperIdQueryParam:
      name: paper_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    RuleIdQueryParam:
      name: rule_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    AutoPullScopeQueryParam:
      name: scope
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullScope'
    AutoPullRuleStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullRuleStatus'
    AutoPullRunStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullRunStatus'
    AutoPullAlertLevelQueryParam:
      name: level
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullAlertLevel'
    AckedQueryParam:
      name: acked
      in: query
      required: false
      schema:
        type: boolean
    Limit200QueryParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    LimitAlertQueryParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100

  responses:
    BadRequest:
      description: Invalid request payload or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Business conflict or version conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request violates policy constraints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream dependency call failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          additionalProperties: false
      additionalProperties: false

    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
      additionalProperties: false

    CreatedByMode:
      type: string
      enum: [llm, human, hybrid]

    ModuleId:
      type: string
      enum: [M4, M5, M6, M7]

    GateDecision:
      type: string
      enum: [promote, hold, reject, loopback]

    AnalysisContract:
      type: string
      enum: [with_m6, no_m6]

    SpineSnapshotType:
      type: string
      enum: [SP-partial, SP-full]

    ReleaseReviewDecision:
      type: string
      enum: [approve, reject, hold]

    LiteratureProvider:
      type: string
      enum: [crossref, arxiv, manual, web, zotero]

    ZoteroLibraryType:
      type: string
      enum: [users, groups]

    RightsClass:
      type: string
      enum: [OA, USER_AUTH, RESTRICTED, UNKNOWN]

    DedupMatchType:
      type: string
      enum: [none, doi, arxiv_id, title_authors_year]

    TopicScopeStatus:
      type: string
      enum: [in_scope, excluded]

    PaperCitationStatus:
      type: string
      enum: [seeded, selected, used, cited, dropped]

    OverviewStatus:
      type: string
      enum: [excluded, automation_ready, citable, not_citable]

    LiteratureContentProcessingDedupStatus:
      type: string
      enum: [unique, duplicate, unknown]

    LiteratureContentProcessingStageCode:
      type: string
      enum:
        - CITATION_NORMALIZED
        - ABSTRACT_READY
        - FULLTEXT_PREPROCESSED
        - KEY_CONTENT_READY
        - CHUNKED
        - EMBEDDED
        - INDEXED

    LiteratureContentProcessingStageStatus:
      type: string
      enum: [NOT_STARTED, PENDING, RUNNING, SUCCEEDED, STALE, FAILED, BLOCKED, SKIPPED]

    LiteratureContentProcessingRunStatus:
      type: string
      enum: [PENDING, RUNNING, PARTIAL, SUCCESS, FAILED, SKIPPED]

    LiteratureContentProcessingTriggerSource:
      type: string
      enum: [CONTENT_PROCESSING_ACTION, BACKFILL]

    LiteratureContentProcessingBatchJobStatus:
      type: string
      enum: [PLANNED, QUEUED, RUNNING, PAUSED, CANCELING, CANCELED, SUCCEEDED, PARTIAL, FAILED]

    LiteratureContentProcessingBatchItemStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, PARTIAL, BLOCKED, FAILED, SKIPPED, CANCELED]

    LiteratureContentProcessingActionCode:
      type: string
      enum: [process_content, process_to_retrievable, rebuild_index, reextract, retry_failed, view_reason]

    LiteratureContentProcessingActionReasonCode:
      type: string
      enum:
        - READY
        - EXCLUDED_BY_SCOPE
        - RIGHTS_RESTRICTED
        - USER_AUTH_DISABLED
        - PREREQUISITE_NOT_READY
        - STAGE_ALREADY_READY
        - RUN_IN_FLIGHT

    LiteratureContentAssetKind:
      type: string
      enum: [raw_fulltext, normalized_text, derived_image, other]

    LiteratureContentAssetSourceKind:
      type: string
      enum: [local_path]

    LiteratureContentAssetStatus:
      type: string
      enum: [registered, missing, unsupported, ready, failed]

    AutoPullScope:
      type: string
      enum: [GLOBAL, TOPIC]

    AutoPullRuleStatus:
      type: string
      enum: [ACTIVE, PAUSED]

    AutoPullSource:
      type: string
      enum: [CROSSREF, ARXIV, ZOTERO]

    AutoPullFrequency:
      type: string
      enum: [DAILY, WEEKLY]

    AutoPullTriggerType:
      type: string
      enum: [MANUAL, SCHEDULE]

    AutoPullRunStatus:
      type: string
      enum: [PENDING, RUNNING, PARTIAL, SUCCESS, FAILED, SKIPPED]

    AutoPullAlertLevel:
      type: string
      enum: [WARNING, ERROR]

    CreatePaperProjectRequest:
      type: object
      required: [title_card_id, title, created_by, initial_context]
      properties:
        title_card_id:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        research_direction:
          type: string
        created_by:
          type: string
          enum: [human, hybrid]
        initial_context:
          type: object
          required: [literature_evidence_ids]
          properties:
            literature_evidence_ids:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 1
          additionalProperties: false
      additionalProperties: false

    CreatePaperProjectResponse:
      type: object
      required: [paper_id, status, paper_active_sp_full, paper_active_sp_partial, created_at]
      properties:
        paper_id:
          type: string
        status:
          type: string
          enum: [active]
        paper_active_sp_full:
          type: [string, 'null']
        paper_active_sp_partial:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    LineageMeta:
      type: object
      required:
        - paper_id
        - stage_id
        - module_id
        - version_id
        - run_id
        - lane_id
        - attempt_id
        - created_by
        - created_at
      properties:
        paper_id:
          type: string
        stage_id:
          type: string
        module_id:
          $ref: '#/components/schemas/ModuleId'
        version_id:
          type: string
          pattern: '^P\\d+-M[1-8]-B\\d+-N\\d+$'
        parent_version_id:
          type: string
        parent_node_ids:
          type: array
          items:
            type: string
        run_id:
          type: string
        lane_id:
          type: string
        attempt_id:
          type: string
        created_by:
          $ref: '#/components/schemas/CreatedByMode'
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    ValueJudgementPayload:
      type: object
      required:
        - judgement_id
        - decision
        - core_score_vector
        - extension_score_vector
        - confidence
        - reason_summary
        - reviewer
        - timestamp
      properties:
        judgement_id:
          type: string
        decision:
          $ref: '#/components/schemas/GateDecision'
        core_score_vector:
          type: object
          additionalProperties:
            type: number
        extension_score_vector:
          type: object
          additionalProperties:
            type: number
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reason_summary:
          type: string
          minLength: 1
        reviewer:
          $ref: '#/components/schemas/CreatedByMode'
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    VersionSpineCommitRequest:
      type: object
      required: [lineage_meta, payload_ref, node_status]
      properties:
        lineage_meta:
          $ref: '#/components/schemas/LineageMeta'
        payload_ref:
          type: string
          minLength: 1
        node_status:
          type: string
          enum: [draft, candidate]
        value_judgement_payload:
          $ref: '#/components/schemas/ValueJudgementPayload'
      additionalProperties: false

    VersionSpineCommitResponse:
      type: object
      required: [node_id, accepted, node_status]
      properties:
        node_id:
          type: string
        accepted:
          type: boolean
        node_status:
          type: string
          enum: [draft, candidate, promoted, hold, rejected, superseded]
      additionalProperties: false

    StageGateVerifyRequest:
      type: object
      required: [candidate_node_ids, config_version, reviewer_mode, analysis_contract]
      properties:
        candidate_node_ids:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        config_version:
          type: string
          minLength: 1
        reviewer_mode:
          $ref: '#/components/schemas/CreatedByMode'
        analysis_contract:
          $ref: '#/components/schemas/AnalysisContract'
        override_context:
          type: object
          properties:
            skip_m6_reason:
              type: string
            training_claim_allowed:
              type: boolean
          additionalProperties: false
      additionalProperties: false

    StageGateVerifyResult:
      type: object
      required: [node_id, decision, reason_summary]
      properties:
        node_id:
          type: string
        decision:
          $ref: '#/components/schemas/GateDecision'
        reason_summary:
          type: string
      additionalProperties: false

    StageGateSnapshotInfo:
      type: object
      required: [snapshot_id, snapshot_type]
      properties:
        snapshot_id:
          type: string
        snapshot_type:
          $ref: '#/components/schemas/SpineSnapshotType'
        spine_type:
          $ref: '#/components/schemas/AnalysisContract'
      additionalProperties: false

    StageGatePointerUpdate:
      type: object
      properties:
        paper_active_sp_full:
          type: string
        paper_active_sp_partial:
          type: string
      additionalProperties: false

    StageGateVerifyResponse:
      type: object
      required: [gate_run_id, results]
      properties:
        gate_run_id:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/StageGateVerifyResult'
        snapshot:
          $ref: '#/components/schemas/StageGateSnapshotInfo'
        pointer_update:
          $ref: '#/components/schemas/StageGatePointerUpdate'
      additionalProperties: false

    WritingPackageBuildRequest:
      type: object
      required: [source_snapshot_id, writing_mode, target_release_tag, sections]
      properties:
        source_snapshot_id:
          type: string
          pattern: '^SP-\\d{4}$'
        writing_mode:
          type: string
          enum: [submission, revision, draft]
        target_release_tag:
          type: string
          pattern: '^R\\d+\\.\\d+\\.\\d+$'
        sections:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
      additionalProperties: false

    WritingPackageBuildComplianceFlags:
      type: object
      required: [claim_evidence_coverage_ok, no_m6_wording_ok]
      properties:
        claim_evidence_coverage_ok:
          type: boolean
        no_m6_wording_ok:
          type: boolean
      additionalProperties: false

    WritingPackageBuildResponse:
      type: object
      required:
        - writing_package_id
        - source_snapshot_id
        - release_tag
        - section_node_ids
        - compliance_flags
      properties:
        writing_package_id:
          type: string
        source_snapshot_id:
          type: string
        release_tag:
          type: string
        section_node_ids:
          type: array
          items:
            type: string
        compliance_flags:
          $ref: '#/components/schemas/WritingPackageBuildComplianceFlags'
      additionalProperties: false

    PaperTimelineEvent:
      type: object
      required: [event_id, event_type, timestamp, summary]
      properties:
        event_id:
          type: string
        event_type:
          type: string
        module_id:
          type: string
        timestamp:
          type: string
          format: date-time
        node_id:
          type: string
        summary:
          type: string
        severity:
          type: string
          enum: [info, warning, error]
      additionalProperties: false

    GetPaperTimelineResponse:
      type: object
      required: [paper_id, events]
      properties:
        paper_id:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/PaperTimelineEvent'
      additionalProperties: false

    PaperRuntimeMetric:
      type: object
      required: [tokens, cost_usd, gpu_requested, gpu_total, updated_at]
      properties:
        tokens:
          type: [number, 'null']
        cost_usd:
          type: [number, 'null']
        gpu_requested:
          type: [number, 'null']
        gpu_total:
          type: [number, 'null']
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    GetPaperResourceMetricsResponse:
      type: object
      required: [paper_id, paper_runtime_metric]
      properties:
        paper_id:
          type: string
        paper_runtime_metric:
          $ref: '#/components/schemas/PaperRuntimeMetric'
      additionalProperties: false

    ArtifactBundle:
      type: object
      required: [proposal_url, paper_url, repo_url, review_url]
      properties:
        proposal_url:
          type: [string, 'null']
        paper_url:
          type: [string, 'null']
        repo_url:
          type: [string, 'null']
        review_url:
          type: [string, 'null']
      additionalProperties: false

    GetPaperArtifactBundleResponse:
      type: object
      required: [paper_id, artifact_bundle]
      properties:
        paper_id:
          type: string
        artifact_bundle:
          $ref: '#/components/schemas/ArtifactBundle'
      additionalProperties: false

    ReleaseReviewRequest:
      type: object
      required: [reviewers, decision, risk_flags, label_policy]
      properties:
        reviewers:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        decision:
          $ref: '#/components/schemas/ReleaseReviewDecision'
        risk_flags:
          type: array
          items:
            type: string
            minLength: 1
        label_policy:
          type: string
          minLength: 1
        comment:
          type: string
      additionalProperties: false

    ReleaseGateReviewResult:
      type: object
      required: [accepted, review_id, audit_ref]
      properties:
        accepted:
          type: boolean
        review_id:
          type: string
        approved_by:
          type: string
        approved_at:
          type: string
          format: date-time
        audit_ref:
          type: string
      additionalProperties: false

    ReleaseGateReviewResponse:
      type: object
      required: [gate_result]
      properties:
        gate_result:
          $ref: '#/components/schemas/ReleaseGateReviewResult'
      additionalProperties: false

    LiteratureCollectionImportItem:
      type: object
      required: [provider, external_id, title, source_url]
      properties:
        provider:
          $ref: '#/components/schemas/LiteratureProvider'
        external_id:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        abstract:
          type: string
        authors:
          type: array
          items:
            type: string
            minLength: 1
        year:
          type: integer
          minimum: 1900
          maximum: 2100
        doi:
          type: string
        arxiv_id:
          type: string
        source_url:
          type: string
          minLength: 1
        rights_class:
          $ref: '#/components/schemas/RightsClass'
        tags:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

    LiteratureCollectionImportRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LiteratureCollectionImportItem'
      additionalProperties: false

    LiteratureCollectionImportResult:
      type: object
      required: [literature_id, is_new, matched_by, title, source_provider, source_url]
      properties:
        literature_id:
          type: string
        is_new:
          type: boolean
        matched_by:
          $ref: '#/components/schemas/DedupMatchType'
        title:
          type: string
        source_provider:
          $ref: '#/components/schemas/LiteratureProvider'
        source_url:
          type: string
      additionalProperties: false

    LiteratureCollectionImportResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/LiteratureCollectionImportResult'
      additionalProperties: false

    ZoteroImportRequest:
      type: object
      required: [library_type, library_id]
      properties:
        library_type:
          $ref: '#/components/schemas/ZoteroLibraryType'
        library_id:
          type: string
          minLength: 1
        api_key:
          type: string
        query:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        topic_id:
          type: string
          minLength: 1
        scope_status:
          $ref: '#/components/schemas/TopicScopeStatus'
        scope_reason:
          type: string
        tags:
          type: array
          items:
            type: string
            minLength: 1
        rights_class:
          $ref: '#/components/schemas/RightsClass'
      additionalProperties: false

    ZoteroImportResponse:
      type: object
      required: [imported_count, scope_upserted_count, results]
      properties:
        topic_id:
          type: string
        imported_count:
          type: integer
        scope_upserted_count:
          type: integer
