components:
  parameters:
    PaperIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    GateParam:
      name: gate
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TopicIdParam:
      name: topicId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RuleIdParam:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunIdParam:
      name: runId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AlertIdParam:
      name: alertId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LinkIdParam:
      name: linkId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LiteratureIdParam:
      name: literatureId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TopicIdQueryParam:
      name: topic_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    PaperIdQueryParam:
      name: paper_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    RuleIdQueryParam:
      name: rule_id
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    AutoPullScopeQueryParam:
      name: scope
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullScope'
    AutoPullRuleStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullRuleStatus'
    AutoPullRunStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullRunStatus'
    AutoPullAlertLevelQueryParam:
      name: level
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AutoPullAlertLevel'
    AckedQueryParam:
      name: acked
      in: query
      required: false
      schema:
        type: boolean
    Limit200QueryParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    LimitAlertQueryParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100

  responses:
    BadRequest:
      description: Invalid request payload or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Business conflict or version conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request violates policy constraints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream dependency call failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          additionalProperties: false
      additionalProperties: false

    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
      additionalProperties: false

    CreatedByMode:
      type: string
      enum: [llm, human, hybrid]

    ModuleId:
      type: string
      enum: [M4, M5, M6, M7]

    GateDecision:
      type: string
      enum: [promote, hold, reject, loopback]

