name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance-lint:
    name: Governance Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run governance lint
        run: node .ai/scripts/ctl-project-governance.mjs lint --check --project main

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Shared typecheck
        run: pnpm --filter @paper-engineering-assistant/shared typecheck

      - name: Backend typecheck
        run: pnpm --filter @paper-engineering-assistant/backend typecheck

      - name: Backend tests (memory repository)
        run: pnpm --filter @paper-engineering-assistant/backend test

  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Desktop typecheck
        run: pnpm desktop:typecheck

      - name: Desktop renderer build
        run: pnpm --filter @paper-engineering-assistant/desktop build:renderer

  prisma-smoke:
    name: Prisma Smoke
    needs: [backend-checks, desktop-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run prisma smoke
        run: pnpm ci:prisma-smoke
        env:
          PRISMA_SMOKE_BASE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres

      - name: Upload prisma smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-prisma-smoke
          path: artifacts/prisma-smoke
