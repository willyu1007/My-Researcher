version: 1
variables:
  APP_ENV:
    type: enum
    enum: [dev, staging, prod]
    required: true
    default: dev
    description: Deployment environment profile.
  SERVICE_NAME:
    type: string
    required: true
    default: your-service
    description: Service name (logical).
  PORT:
    type: int
    required: true
    default: 8000
    description: Service listen port.
  LITERATURE_USER_AUTH_PIPELINE_ENABLED:
    type: enum
    enum: ['true', 'false']
    required: false
    default: 'false'
    description: Enable deep pipeline stages for USER_AUTH literature rights class.
  LITERATURE_PIPELINE_EMBEDDING_URL:
    type: string
    required: false
    description: Optional external embedding endpoint; unset means local fallback embedding.
  LITERATURE_PIPELINE_EMBEDDING_API_KEY:
    type: string
    required: false
    description: Optional API key for external embedding endpoint.
  LITERATURE_PIPELINE_EMBEDDING_MODEL:
    type: string
    required: false
    default: text-embedding-v1
    description: Embedding model name used when external embedding endpoint is configured.
