        decision:
          $ref: '#/components/schemas/PromotionDecisionType'
        reason_summary:
          type: string
          minLength: 10
        target_paper_title:
          type: string
          minLength: 5
        loopback_target:
          type: string
          enum: [need_review, research_question, value_assessment, package]
        created_by:
          type: string
          enum: [llm, human, hybrid]
      allOf:
        - if:
            properties:
              decision:
                const: promote
          then:
            required: [package_id, target_paper_title]
        - if:
            properties:
              decision:
                const: loopback
          then:
            required: [loopback_target]

    PromoteTitleCardToPaperProjectRequest:
      type: object
      additionalProperties: false
      required: [research_question_id, value_assessment_id, package_id, title, created_by]
      properties:
        research_question_id:
          type: string
          minLength: 4
        value_assessment_id:
          type: string
          minLength: 4
        package_id:
          type: string
          minLength: 4
        title:
          type: string
          minLength: 5
        research_direction:
          type: string
        created_by:
          type: string
          enum: [human, hybrid]

    PromoteTitleCardToPaperProjectResponse:
      type: object
      required: [paper_id, decision_id]
      additionalProperties: false
      properties:
        paper_id: { type: string }
        decision_id: { type: string }
