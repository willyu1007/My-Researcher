        question_id: { type: string }
        value_assessment_id: { type: string }
        package_id: { type: string }
        decision:
          $ref: '#/components/schemas/TopicPromotionDecisionType'
        reason_summary:
          type: string
        target_paper_title:
          type: string
        promoted_paper_id:
          type: string
        loopback_target:
          type: string
          enum: [need_review, question, value_assessment, topic_package]
        created_by:
          type: string
          enum: [llm, human, hybrid]
        created_at:
          type: string
          format: date-time

    CreateTopicPromotionDecisionRequest:
      type: object
      additionalProperties: false
      required: [question_id, value_assessment_id, decision, reason_summary, created_by]
      properties:
        question_id:
          type: string
          minLength: 4
        value_assessment_id:
          type: string
          minLength: 4
        package_id:
          type: string
          minLength: 4
        decision:
          $ref: '#/components/schemas/TopicPromotionDecisionType'
        reason_summary:
          type: string
          minLength: 10
        target_paper_title:
          type: string
          minLength: 5
        loopback_target:
          type: string
          enum: [need_review, question, value_assessment, topic_package]
        created_by:
          type: string
          enum: [llm, human, hybrid]
      allOf:
        - if:
            properties:
              decision:
                const: promote
          then:
            required: [package_id, target_paper_title]
        - if:
            properties:
              decision:
                const: loopback
          then:
            required: [loopback_target]

